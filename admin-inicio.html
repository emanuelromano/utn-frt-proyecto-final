<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>Pastelería · Administrador</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">
    <!-- Scripts y JSON -->
    <script src="./javascript/config.js"></script>
    <script src="./javascript/admin-index.js"></script>
    <script src="./json/productos.json"></script>
    <script src="https://kit.fontawesome.com/4d2d62b243.js" crossorigin="anonymous"></script>
</head>

<body class="admin-body">
    <div class="contenedor">
        <header class="cabecera">
            <div class="cabecera-izq">
                <img src="./img/cake2.svg" alt="Pastel" draggable="false">
                <h1>La Pastelería</h1>

            </div>

            <div class="admin-usuario">
                <div class="admin-linea">
                    <i class="fa-solid fa-user admin-icon"></i>
                    <span class="admin-label">Administrador:</span>
                    <span id="admin-nombre"></span>
                </div>

                <a href="#" class="admin-logout" onclick="cerrarSesion()">
                    Cerrar sesión
                </a>
            </div>

            <div class="cabecera-der" onclick="menuHamburguesa()">
                <img src="./img/menu2.svg" alt="Menu" draggable="false">
            </div>
        </header>

        <nav class="menu">
            <ul type="none">
                <li><a href="./admin-inicio.html" class="selecc">Inicio</a></li>
                <li><a id="menu-item-1" href="./admin-productos.html">Productos</a></li>
                <li><a id="menu-item-2" href="./admin-cupones.html">Cupones</a></li>
                <li><a id="menu-item-3" href="./admin-usuarios.html">Usuarios</a></li>
                <!-- <li><a id="menu-item-4" class="boton-carrito-contador" href="./carro.html">Carro (0)</a></li> -->
            </ul>
        </nav>

        <div class="caja"></div>

        <aside class="aside">
            <div class="aside-in">

            </div>
        </aside>

        <div class="contenido">
            <div class="contenido-in2">
                <div class="admin-productos-header">
                    <h2>Inicio:</h2>
                </div>

                <!-- Aquí va el contenido -->

                <div class="admin-dashboard">
                    <div class="admin-card">
                        <div class="admin-card-titulo">
                            <i class="fa-solid fa-cake-candles"></i>
                            Total de productos
                        </div>
                        <div class="admin-card-numero" id="dash-productos">
                            0
                        </div>
                    </div>

                    <div class="admin-card">
                        <div class="admin-card-titulo">
                            <i class="fa-solid fa-eye"></i>
                            Productos activos
                        </div>
                        <div class="admin-card-numero" id="dash-activos">
                            0
                        </div>
                    </div>

                    <div class="admin-card">
                        <div class="admin-card-titulo">
                            <i class="fa-solid fa-eye-slash"></i>
                            Productos ocultos
                        </div>
                        <div class="admin-card-numero" id="dash-inactivos">
                            0
                        </div>
                    </div>

                    <div class="admin-card">
                        <div class="admin-card-titulo">
                            <i class="fa-solid fa-ticket"></i>
                            Cupones disponibles
                        </div>
                        <div class="admin-card-numero" id="dash-cupones">
                            0
                        </div>
                    </div>

                    <div class="admin-card">
                        <div class="admin-card-titulo">
                            <i class="fa-solid fa-user"></i>
                            Usuarios totales
                        </div>
                        <div class="admin-card-numero" id="dash-usuarios">
                            0
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer class="foot">
            <hr />
            <div>Sitio creado por <a href="./nosotros.html">Emanuel Romano</a> · <a href="./contacto.html">Contacto</a>
                · 2026</div>
        </footer>

    </div>
</body>

</html>
