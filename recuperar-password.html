<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>Pastelería · Recuperar contraseña</title>

    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">

    <script src="./javascript/config.js"></script>
    <script src="./javascript/recuperar-password.js"></script>

    <script src="https://kit.fontawesome.com/4d2d62b243.js" crossorigin="anonymous"></script>

</head>

<body id="bdylog">
    <header class="cabecera">
        <div class="cabecera-izq">
            <img src="./img/cake2.svg" alt="Pastel" draggable="false">
            <h1>La Pastelería</h1>
        </div>

        <a href="iniciar-sesion.html" target="" id="btn">
            <button id="bts">
                Atrás
            </button>
        </a>
    </header>

    <div class="recuperar-box">
        <h2 class="recuperar-titulo">Recuperar contraseña</h2>

        <div class="recuperar-email">
            <label for="email">Email de usuario:</label>
            <input type="email" class="recuperar-email" id="recuperar-email" placeholder="Ingrese su email">
            <button class="recuperar-btn" type="button" onclick="enviarCodigo()">
                Enviar código de recuperación
            </button>
        </div>

        <hr class="recuperar-separador">

        <div class="recuperar-reset">
            <label>Código recibido:</label>
            <input type="text" id="codigo" maxlength="6">
            <label>Nueva contraseña:</label>
            <input type="password" id="password">
            <button class="recuperar-btn" type="button" onclick="restablecerPassword()">
                Restablecer contraseña
            </button>
        </div>
    </div>

</body>

</html>
