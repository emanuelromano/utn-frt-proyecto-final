<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>Pastelería · Agregar Producto</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">
    <!-- Scripts -->
    <script src="./javascript/config.js"></script>
    <script src="./javascript/admin-agregar-cupon.js"></script>
    <script src="./javascript/previsualizar.js"></script>
    <script src="https://kit.fontawesome.com/4d2d62b243.js" crossorigin="anonymous"></script>
</head>

<body class="admin-body">
    <div class="contenedor">
        <header class="cabecera">
            <div class="cabecera-izq">
                <img src="./img/cake2.svg" alt="Pastel" draggable="false">
                <h1>La Pastelería</h1>
            </div>

            <div class="admin-usuario">
                <div class="admin-linea">
                    <i class="fa-solid fa-user admin-icon"></i>
                    <span id="admin-label" class="admin-label"></span>
                    <span id="admin-nombre"></span>
                </div>

                <a href="#" class="admin-logout" onclick="cerrarSesion()">
                    Cerrar sesión
                </a>
            </div>

            <div class="cabecera-der" onclick="menuHamburguesa()">
                <img src="./img/menu2.svg" alt="Menu" draggable="false">
            </div>
        </header>

        <nav class="menu">
            <ul type="none">
                <li><a id="menu-item-1" href="./admin-inicio.html">Inicio</a></li>
                <li><a href="./admin-productos.html" class="selecc">Productos</a></li>
                <li><a id="menu-item-2" href="./admin-cupones.html">Cupones</a></li>
                <li><a id="menu-item-3" href="./admin-usuarios.html">Usuarios</a></li>
                <!-- <li><a id="menu-item-4" class="boton-carrito-contador" href="./carro.html">Carro (0)</a></li> -->
            </ul>
        </nav>

        <div class="caja"></div>

        <aside class="aside">
            <div class="aside-in"></div>
        </aside>

        <div class="contenido">
            <form class="contenido-in2">
                <div class="producto-atras-div">
                    <h2>Nuevo cupón:</h2>
                    <a class="atras-div" href="./admin-cupones.html"><i class="fa-solid fa-arrow-left" style="color: #9d4a07;"></i> Volver</a>
                </div>

                <!-- Nombre -->
                <label for="nombre">Nombre del cupón (sin espacios, max. 15 caracteres):</label>
                <input type="text" id="nombre-cupon" name="nombre" maxlength="15" oninput="formatearCupon(this)" required>

                <!-- Texto -->
                <label for="descripcion">Texto descriptivo al aplicar:</label>
                <textarea id="descripcion" name="descripcion" rows="4" maxlength="255"></textarea>

                <!-- Descuento -->
                <label for="descuento">Porcentaje de descuento:</label>
                <input type="number" id="descuento" name="descuento" min="0" max="100" step="1" oninput="soloEnteros(this)">

                <!-- Botón -->
                <button type="button" id="btn-agregar-producto" onclick="agregarCupon()">
                    Guardar cupón
                </button>
            </form>
        </div>

        <footer class="foot">
            <hr>
            <div>
                Sitio creado por
                <a href="./nosotros.html">Emanuel Romano</a> ·
                <a href="./contacto.html">Contacto</a> · 2026
            </div>
        </footer>
    </div>
</body>

</html>
